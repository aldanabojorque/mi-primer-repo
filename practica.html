<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica HTML desde cero</title>
</head>
<body>

    <header>
        <h1>Mi primera página desde cero</h1>
        <nav>
            <a href="#">Inicio</a>
            <a href="#">Acerca</a>
            <a href="#">Contacto</a>
        </nav>
    </header>

    <main>
        <section>
            <h2>Sección principal</h2>
            <p>Este es un párrafo dentro de la sección principal.</p>
        </section>

        <article>
            <h3>Artículo de ejemplo</h3>
            <p>Este es un artículo independiente dentro del contenido.</p>
        </article>

        <aside>
            <p>Este es un contenido lateral (aside).</p>
        </aside>
    </main>

    <footer>
        <p>© 2024 Mi práctica HTML</p>
    </footer>

</body>
</html>
